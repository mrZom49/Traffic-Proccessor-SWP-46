name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up Python (for linting and testing)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install dependencies (if you have a requirements.txt or pyproject.toml)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        # If you have a requirements file in each service, install them
        # pip install -r src/Traffic_Processor/requirements.txt
        # pip install -r src/cnss/requirements.txt

    # 4. Lint with flake8 (optional but recommended)
    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 5. Build Docker images
    - name: Build Docker images
      run: |
        cd src
        docker-compose build

    # 6. Run tests inside Docker containers (if you have tests)
    - name: Run tests
      run: |
        cd src
        docker-compose up -d
        # Wait for services to be ready
        sleep 10
        # Run your test commands here, e.g.:
        # docker-compose exec tproc pytest
        # docker-compose exec cnss pytest
        docker-compose down
