version: "2.4"

services:

  # --------------------------------------------------------
  # 1. TProc - Packet caprute (shares gate's network)
  # --------------------------------------------------------
  tproc:
    build:
      context: ./Traffic_Processor
      dockerfile: Dockerfile.tproc
    container_name: tproc
    network_mode: "service:gate"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - shared_data:/data
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      python tproc.py -i eth0
    depends_on:
      - gate
    restart: unless-stopped

  # --------------------------------------------------------
  # 2. Gate — Reverse Proxy with IP Filtering
  # --------------------------------------------------------
  gate:
    build:
      context: ./gate
      dockerfile: Dockerfile
    container_name: gate
    ports:
      - "8000:8080"
    networks:
      - swp-net
    restart: unless-stopped

  # --------------------------------------------------------
  # 3. Mock Target — Protected app
  # --------------------------------------------------------
  mock_target:
    build:
      context: ./mock_target
      dockerfile: Dockerfile
    container_name: mock_target
    expose:
      - "5000"                 # Internal only — NO public ports!
    networks:
      - swp-net
    restart: unless-stopped

  # --------------------------------------------------------
  # 4. ERROR Server — Page for Blocked IPs
  # --------------------------------------------------------
  error-server:
    build:
      context: ./error_server
      dockerfile: Dockerfile
    container_name: error_server
    expose:
      - "5000"
    networks:
      - swp-net
    restart: unless-stopped

  # --------------------------------------------------------
  # 5. CNSS — Control & Status Server
  # --------------------------------------------------------
  cnss:
    build:
      context: ./cnss
      dockerfile: Dockerfile
    container_name: cnss
    ports:
      - "8080:8080"
    expose:
      - "8080"
    environment:
      - DB_NAME=postgresdb
      - DB_USER=postgres_user
      - DB_PASSWORD=password123
      - DB_HOST=postgres
      - DB_PORT=5432
      - DEV_MODE=true
    command: >
      sh -c "poetry run alembic upgrade head &&
             poetry run uvicorn app.main:app --host 0.0.0.0 --port 8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - swp-net
    restart: unless-stopped

  # --------------------------------------------------------
  # 6. PostgreSQL
  # --------------------------------------------------------
  postgres:
    image: postgres:14.8-alpine3.18
    container_name: postgres_swp
    environment:
      POSTGRES_DB: "postgresdb"
      POSTGRES_USER: "postgres_user"
      POSTGRES_PASSWORD: "password123"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d postgresdb"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - swp-net
    restart: unless-stopped

networks:
  swp-net:
    driver: bridge
    name: swp-net

volumes:
  shared_data:
    driver: local
  postgres_data:
    driver: local