<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Processor</title>
    <link rel="stylesheet" href="./styles.css?v=2" />
  </head>
  <body>
    <main class="page">
      <section class="panel" aria-live="polite">
        <span class="diode" id="status-diode" title="Traffic processor status"></span>
        <p class="label" id="primary-label">Bytes per second</p>
        <div class="primary-value" id="primary-value">0</div>
        <p class="rate" id="rate-value">0 total bytes</p>

        <div class="direction-stats" id="bytes-direction-stats">
          <div>
            <span>Incoming bytes</span>
            <strong id="incoming-bytes">0 B</strong>
          </div>
          <div>
            <span>Outgoing bytes</span>
            <strong id="outgoing-bytes">0 B</strong>
          </div>
        </div>

        <div class="direction-stats" id="packet-direction-stats" hidden>
          <div>
            <span>Incoming packets</span>
            <strong id="incoming-packets">0</strong>
          </div>
          <div>
            <span>Outgoing packets</span>
            <strong id="outgoing-packets">0</strong>
          </div>
        </div>

        <div class="packet-types" id="packet-types" hidden>
          <div>TCP <strong id="tcp-packets">0</strong></div>
          <div>UDP <strong id="udp-packets">0</strong></div>
          <div>ICMP <strong id="icmp-packets">0</strong></div>
          <div>Other <strong id="other-packets">0</strong></div>
        </div>
      </section>

      <button class="mode-button" id="mode-button" type="button">Show packets</button>
    </main>

    <script src="./app.js?v=2"></script>
  </body>
</html>
